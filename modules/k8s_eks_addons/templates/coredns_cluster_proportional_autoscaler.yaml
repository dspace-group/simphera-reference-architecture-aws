nameOverride: coredns

config:
    linear:
    coresPerReplica: 256
    nodesPerReplica: 16
    min: 1
    max: 100
    preventSinglePointFailure: true
    includeUnschedulableNodes: true

options:
    target: "deployment/coredns"

podSecurityContext:
    seccompProfile:
    type: RuntimeDefault
    supplementalGroups: [ 65534 ]
    fsGroup: 65534

tolerations:
    - key: "CriticalAddonsOnly"
    operator: "Exists"
blueprints:
    connection: "none"